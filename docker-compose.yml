version: '3.8'

services:
  mongo:
    image: mongo:6-jammy
    container_name: stinchar-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: stinchar-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/mern_mvc_users
      - ADMIN_ACCESS_CODE=1234
      - JWT_SECRET=secret1234
    depends_on:
      - mongo
    volumes:
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build: 
      context: ./frontend
      args:
        # Use localhost or your machine's IP when viewing from the host
        - VITE_API_URL=http://localhost:5000
    container_name: stinchar-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
